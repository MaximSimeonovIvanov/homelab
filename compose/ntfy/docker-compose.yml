services:
  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    restart: unless-stopped
    command:
      - serve
    environment:
      - NTFY_BASE_URL=http://192.168.0.215:5555
      - NTFY_LISTEN_HTTP=:80
      - NTFY_AUTH_DEFAULT_ACCESS=deny-all
      - NTFY_AUTH_FILE=/etc/ntfy/user.db
    volumes:
      - ./cache:/var/cache/ntfy
      - ./data:/etc/ntfy
    ports:
      - "5555:80"
